<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productivity Dashboard</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <main class="dashboard">
        <header>
            <h1>Productivity Dashboard</h1>
        </header>

        <section id="greeting-container" class="component">
            <!-- GreetingDisplay component will render here -->
        </section>

        <section id="timer-container" class="component">
            <!-- FocusTimer component will render here -->
        </section>

        <section id="task-list-container" class="component">
            <!-- TaskList component will render here -->
        </section>

        <section id="quick-links-container" class="component">
            <!-- QuickLinks component will render here -->
        </section>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
